name = "flare-cms-dev"
main = "src/index.ts"
compatibility_date = "2024-01-01"
compatibility_flags = ["nodejs_compat"]

# Cloudflare Workers settings
workers_dev = true

# D1 Database
[[d1_databases]]
binding = "DB"
database_name = "my-astro-cms-db"
database_id = "a2fe8bde-3cb8-4c0b-8a66-a996c482e5a3"
migrations_dir = "./node_modules/@flare-cms/core/migrations"

# R2 Bucket for media storage
[[r2_buckets]]
binding = "MEDIA_BUCKET"
bucket_name = "my-astro-cms-media"

# KV Namespace for rate limiting cache
[[kv_namespaces]]
binding = "CACHE_KV"
id = "7dacbabdf6aa4896b0c9b0bc7b9125fe"

# Environment variables
[vars]
ENVIRONMENT = "development"
CORS_ORIGINS = "http://localhost:4321,http://localhost:8787"

# Webhook configuration (Phase 4)
# Comma-separated URLs to POST on content publish/unpublish events
# Leave empty to disable webhooks; fill in a URL to test locally
WEBHOOK_URLS = ""
# Shared secret for HMAC-SHA256 webhook signatures
# Leave empty to send unsigned webhooks (a console.warn will be logged)
# Production values should be set in [env.production] below
WEBHOOK_SECRET = ""

# Production environment
[env.production]
name = "flare-cms"
vars = { ENVIRONMENT = "production", CORS_ORIGINS = "https://flare-site.pages.dev", WEBHOOK_URLS = "", WEBHOOK_SECRET = "" }

[[env.production.d1_databases]]
binding = "DB"
database_name = "my-astro-cms-db"
database_id = "a2fe8bde-3cb8-4c0b-8a66-a996c482e5a3"
migrations_dir = "./node_modules/@flare-cms/core/migrations"

[[env.production.r2_buckets]]
binding = "MEDIA_BUCKET"
bucket_name = "my-astro-cms-media"

[[env.production.kv_namespaces]]
binding = "CACHE_KV"
id = "7dacbabdf6aa4896b0c9b0bc7b9125fe"

# Staging environment (migration testing)
[env.staging]
name = "flare-cms-staging"
vars = { ENVIRONMENT = "staging", CORS_ORIGINS = "http://localhost:4321,http://localhost:8787" }

[[env.staging.kv_namespaces]]
binding = "CACHE_KV"
id = "deeb721cb0e5460ca410222fef5af184"

[[env.staging.d1_databases]]
binding = "DB"
database_name = "my-astro-cms-db-staging"
database_id = "83d65e82-86dd-4c43-8494-60f50e4c0053"

[[env.staging.r2_buckets]]
binding = "MEDIA_BUCKET"
bucket_name = "my-astro-cms-media"

# Cron triggers for scheduled content publishing
[triggers]
crons = ["* * * * *"]

# Observability
[observability]
enabled = true
